identification:
  abstract:
    en: 'Airborne Light Detection and Ranging (LiDAR) data and orthoimagery were collected
      by Hakai’s Airborne Coastal Observatory (ACO) in the early fall of 2019 for
      designated Nanwakolas and FLNRORD Coastal Experimental Watersheds in the region
      of Knight Inlet, BC. These remotely sensed data will be used to support the
      design and implementation of controlled watershed experiments at spatial scales
      ranging from fine (plot or stand) to coarse (landscape). Repeat (multi-temporal)
      aerial remote sensing surveys are required to detect spatiotemporal changes
      and trends in fine to coarse-scaled ecological and geomorphological phenomena.
      Airborne LiDAR provides 3-D measurements of forest structure and topography
      at high spatial resolutions and over relatively large spatial extents, and now
      routinely used to identify individual tree crowns, vertical canopy profiles,
      canopy gaps, stand edges, watersheds, sub-basins, channels, and other ecologically
      relevant landforms. High-spatial-resolution measurements can be further aggregated
      into coarser-scaled ecological entities (e.g., patches, stands, regions, etc.)
      using data-driven analytical approaches and methods (e.g., object-based image
      analysis and clustering). Ground-truth in the form of field visits, air calls,
      airphoto interpretation, or some combination of all the

      above are required to place meaningful labels on these new, coarser-scaled spatial
      entities.



      We propose to build several spatial data layers and thematic maps that would
      support Nanwakolas and FLNRORD Coastal Experimental Watersheds programs. First,
      several well-established area-based LiDAR canopy height and density metrics
      related to the vertical and horizontal structure of forest canopies will be
      extracted at raster cell sizes of 10 and 20 m (100-400m2). Studies demonstrate
      that these metrics are strongly associated with gradients of microclimates (e.g.,
      light, temperature, moisture, etc.), materials (e.g., phytomass, nutrients,
      gases, water, etc.), processes (e.g., light capture, photosynthesis, throughfall,
      evapotranspiration, etc.), organisms (e.g., epiphytes, mammals, birds, insects,
      microbes, etc.), and timber (e.g., wood volume and mass). LiDAR canopy height
      and density metrics also change markedly with stand age and may therefore be
      used to study stand developmental processes and pathways, as well as to predict
      stand age, at least within ecologically meaningful age classes. Landscape-level
      variations in forest canopy structure are driven by differences in stand age,
      species composition, site productivity, climate, and disturbance. We will use
      data-driven, spatial aggregation techniques to partition continuous, cell-level
      measurements of canopy height and density into unique structural groups or prototypes
      that are homogeneous with respect to the variables used to define them.'
    fr: 'Des données de détection et de télémétrie par la lumière aéroportées (LiDAR)
      et une orthoimagerie ont été collectées par l''Observatoire côtier aéroporté
      (ACO) de Hakai au début de l''automne 2019 pour les bassins versants expérimentaux
      côtiers désignés de Nanwakolas et du FLNORD dans la région de Knight Inlet,
      en Colombie-Britannique. Ces données de télédétection seront utilisées pour
      soutenir la conception et la mise en œuvre d''expériences contrôlées sur les
      bassins versants à des échelles spatiales allant de fine (parcelle ou peuplement)
      à grossière (paysage). Des relevés aériens répétés (multitemporels) par télédétection
      sont nécessaires pour détecter les changements spatio-temporels et les tendances
      des phénomènes écologiques et géomorphologiques de petite à grande échelle.
      Le LiDAR aéroporté fournit des mesures 3D de la structure et de la topographie
      des forêts à des résolutions spatiales élevées et sur des étendues spatiales
      relativement importantes. Il est désormais couramment utilisé pour identifier
      les cimes des arbres individuels, les profils verticaux de la canopée, les interstices
      de canopée, les bordures de peuplement, les bassins versants, les sous-bassins,
      les canaux et d''autres formes de relief pertinentes sur le plan écologique.
      Les mesures à haute résolution spatiale peuvent être agrégées davantage en entités
      écologiques à plus grande échelle (par exemple, des parcelles, des peuplements,
      des régions, etc.) à l''aide d''approches et de méthodes analytiques basées
      sur les données (par exemple, l''analyse d''images basée sur des objets et le
      regroupement). La vérité sur le terrain sous forme de visites sur le terrain,
      d''appels aériens, d''interprétation de photos aériennes ou d''une combinaison
      de toutes les

      ci-dessus sont nécessaires pour apposer des étiquettes significatives sur ces
      nouvelles entités spatiales à plus grande échelle.



      Nous proposons de créer plusieurs couches de données spatiales et des cartes
      thématiques qui soutiendraient les programmes de bassins versants expérimentaux
      côtiers de Nanwakolas et du FLNRORD. Tout d''abord, plusieurs mesures de hauteur
      et de densité de la canopée LiDAR bien établies, liées à la structure verticale
      et horizontale du couvert forestier, seront extraites à des tailles de cellules
      matricielles de 10 et 20 m (100 à 400 m2). Des études démontrent que ces paramètres
      sont fortement associés aux gradients de microclimats (par exemple, lumière,
      température, humidité, etc.), de matériaux (par exemple, phytomasse, nutriments,
      gaz, eau, etc.), de processus (par exemple, capture de la lumière, photosynthèse,
      ruissellement, évapotranspiration, etc.), d''organismes (par exemple, épiphytes,
      mammifères, oiseaux, insectes, microbes, etc.) et de bois (par exemple, bois
      et masse volumique)). Les mesures de hauteur et de densité de la canopée LiDAR
      changent également de façon marquée avec l''âge des peuplements et peuvent donc
      être utilisées pour étudier les processus et les voies de développement des
      peuplements, ainsi que pour prédire l''âge des peuplements, du moins dans des
      classes d''âge écologiquement significatives. Les variations de la structure
      du couvert forestier à l''échelle du paysage sont dues à des différences dans
      l''âge des peuplements, la composition des espèces, la productivité des sites,
      le climat et les perturbations. Nous utiliserons des techniques d''agrégation
      spatiale basées sur les données pour répartir les mesures continues de la hauteur
      et de la densité de la canopée au niveau des cellules en groupes structuraux
      uniques ou en prototypes homogènes par rapport aux variables utilisées pour
      les définir.'
