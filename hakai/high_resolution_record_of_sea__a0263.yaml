identification:
  abstract:
    en: 'The Environment Canada weather mooring at Sentry Shoal in the Northern Strait
      of Georgia provides a platform of opportunity for collection of high frequency
      biogeochemical measurements. From spring to fall in 2015, 2016, and 2017, autonomous
      sensors were

      deployed on the mooring to collect surface nitrate, temperature and salinity
      measurements every 30 minutes. Nitrate concentration was measured using a Satlantic
      SUNA (Ultraviolet Nitrate Analyzer), temperature and salinity were measured
      using a SeaBird 37-SMP

      MicroCAT. Sensors were deployed each year in the spring and serviced in the
      field every 2-3 months, following recovery in the fall, sensors were shipped
      for factory service and calibration.


      This project was supported by the Tula Foundation and the Pacific Salmon Foundation,
      fieldwork was a collaborative effort between the Hakai Institute, and SeaThis
      Consulting.'
    fr: 'Le poste d''amarrage météorologique d''Environnement Canada à Sentry Shoal,
      dans le nord du détroit de Géorgie, offre une plate-forme permettant de recueillir
      des mesures biogéochimiques à haute fréquence. Du printemps à l''automne en
      2015, 2016 et 2017, les capteurs autonomes étaient déployés sur le mouillage
      pour recueillir des mesures de nitrates de surface, de température et de salinité
      toutes les 30 minutes. La concentration de nitrate a été mesurée à l''aide d''un
      Satlantic SUNA (analyseur de nitrate ultraviolet), la température et la salinité
      ont été mesurées à l''aide d''un SeaBird 37-SMP MicroCat. Les capteurs étaient
      déployés chaque année au printemps et entretenus sur le terrain tous les 2 à
      3 mois. Après leur rétablissement à l''automne, les capteurs étaient expédiés
      pour être entretenus en usine et étalonnés.


      Ce projet a été soutenu par la Tula Foundation et la Pacific Salmon Foundation.
      Le travail de terrain était le fruit d''une collaboration entre l''Institut
      Hakai et SeaThis Consulting.'
