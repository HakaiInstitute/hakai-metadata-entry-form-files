identification:
  abstract:
    en: In September 2023, a bathymetric survey was performed in Knight Inlet, BC
      in order to classify the seafloor substrate in order to better inform the dive
      team where Primnoa Pacifica is likely to be found. The survey was performed
      within the Mamalilikulla Indigenous Protected and Conserved Area (IPCA) in the
      Hoeya Head & Lull Bay regions, centered around 50.678074°N, 125.995520°W.
    fr: En septembre 2023, une étude bathymétrique a été réalisée à Knight Inlet,
      en Colombie-Britannique, afin de classer le substrat du fond marin afin de mieux
      informer l'équipe de plongée sur les sites susceptibles de trouver Primnoa Pacifica.
      L'étude a été réalisée dans l'aire protégée et conservée indigène (IPCA) de
      Mamalilikulla, dans les régions de Hoeya Head et de Lull Bay, centrée autour
      de 50,678074°N, 125,995520°W.
