identification:
  abstract:
    en: 'This dataset provides water chemistry data for several streams located on
      the West Coast of Vancouver Island. It is comprised of riverine measurements
      at 29 near-outlet stream locations in 28 watersheds, between  November 2018
      and January 2026. Data collection was done by several partners, following established
      field and lab protocols available in this data package. Until June 2023, we
      only collected samples for Dissolved organic carbon (DOC) analysis. Starting
      in June 2023, Total dissolved nitrogen (TDN), Ammonium (NH4), Silica (SiO2),
      Phosphate (PO4) and Nitrite+Nitrate (NO2+NO3) samples were added and collected
      during each sampling event while additional characteristics were also being
      collected by the Hakai Institute staff at selected sites.


      A selection of characteristics have been quality-controlled (QC) while other
      data is provided in a raw, uncontrolled form. It is the sole responsibility
      of the user to examine the presence of QC flags for each data point before including
      it in analyses, models, or visualizations.'
    fr: 'Ce jeu de données fournit des données sur la chimie de l''eau pour plusieurs
      cours d''eau situés sur la côte ouest de l''île de Vancouver. Il comprend des
      mesures fluviales à 29 sites situés près de l''exutoire dans 28 bassins versants,
      entre novembre 2018 et janvier 2026. La collecte des données a été effectuée
      par plusieurs partenaires, conformément aux protocoles de terrain et de laboratoire
      établis disponibles dans cet ensemble de données. Jusqu''en juin 2023, nous
      ne collections des échantillons que pour l''analyse du carbone organique dissous
      (COD). À partir de juin 2023, des échantillons d''azote dissous total (TDN),
      d''ammonium (NH4), de silice (SiO2), de phosphate (PO4) et de nitrite+nitrate
      (NO2+NO3) ont été ajoutés et collectés lors de chaque événement d''échantillonnage,
      tandis que des caractéristiques supplémentaires étaient également collectées
      par le personnel de l''Institut Hakai sur des sites sélectionnés.


      Certaines caractéristiques ont fait l''objet d''un contrôle de qualité (CQ)
      tandis que d''autres données sont fournies sous forme brute et non contrôlée.
      Il est de la seule responsabilité de l''utilisateur d''examiner la présence
      de drapeaux de contrôle qualité pour chaque point de données avant de l''inclure
      dans des analyses, des modèles ou des visualisations.'
    translations:
