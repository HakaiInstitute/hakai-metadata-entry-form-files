identification:
  abstract:
    en: Data provided here a broad range of data types that were part of a mouse study
      conducted in the summers of 2015-2017. Mice (Keen’s mice, Peromyscus keeni)
      were live-trapped from shorelines approximately 125m into the forest at 5 sites
      on the Central Coast. Paired with live-trapping data are estimates of terrestrial
      invertebrate biomass, and littoral beach invertebrate biomass. All samples were
      processed for stable isotope analysis (𝛿13C and 𝛿15N) to determine which trophic
      levels and consumers were enriched by marine-derived subsidies, primarily from
      wrack. This study was part of the 100 Islands Project, investigating the effects
      of marine-derived nutrients on terrestrial consumers occupying island shorelines.
    fr: Les données ont fourni ici un large éventail de types de données qui ont fait
      partie d'une étude sur la souris menée au cours des étés 2015-2017. Des souris
      (souris de Keen, Peromyscus keeni) ont été piégées depuis les rivages à environ
      125 m dans la forêt à 5 sites de la côte centrale. Des estimations de la biomasse
      des invertébrés terrestres et de la biomasse des invertébrés des plages littorales
      sont associées aux données de piégeage vivant. Tous les échantillons ont été
      traités pour l'analyse des isotopes stables (13C et 15N) afin de déterminer
      quels niveaux trophiques et quels consommateurs ont été enrichis par des subventions
      dérivées de la mer, principalement du wack. Cette étude s'inscrivait dans le
      cadre du projet 100 Islands, qui étudiait les effets des nutriments d'origine
      marine sur les consommateurs terrestres occupant les rives des îles.
    translations:
