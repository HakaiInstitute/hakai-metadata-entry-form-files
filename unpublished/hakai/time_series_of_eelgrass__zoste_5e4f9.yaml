identification:
  abstract:
    en: "This data package represents a time series of eelgrass (*Zostera marina*)\
      \ meadow extent derived from remotely piloted aerial system (RPAS or drone)\
      \ surveys, along with relevant metadata. RPAS surveys are conducted annually\
      \ at long-term monitoring sites on the Central Coast of British Columbia, Canada.\
      \ These data are collected as part of the Hakai Institute Habitat Mapping Program,\
      \ whose broader goal is to document and understand long-term trends in eelgrass\
      \ meadow dynamics and drivers at local, regional, and coast-wide scales. The\
      \ Hakai Institute started using drones in 2015 as part of this work in order\
      \ to capture site-level data on eelgrass distribution for long-term ecological\
      \ research.\n\nDrone surveys are conducted annually during morning low tides\
      \ (<0.5 m) and collect RGB (red-green-blue) imagery. Eelgrass extent is derived\
      \ from drone-derived orthomosaics using a combination of object-based image\
      \ analysis (OBIA) in eCognition Developer 9 and manual delineation in ArcMap\
      \ (v10.8). Segmentation outputs are classified by a trained analyst and reviewed\
      \ by a second analyst. A minimum mapping unit of 2 m² for minimum patch size.\
      \ Areal extent (m²) data are provided as vector features in NAD83 UTM Zone 9N\
      \ clipped to each site area of interest (AOI) to ensure the same areas are compared\
      \ over time and then published to a geodatabase.\n\n \nThis data package includes\
      \ a geodatabase which contains:\n - Polygon vector features of eelgrass meadow\
      \ extent (.gdb)\n - Polygon vector features of the area of interest (AOI) of\
      \ each monitoring site (.gdb)\n - A documents (.pdf) which describes site locations,\
      \ methods for imagery collection, generating orthomosaics, and delineating eelgrass\
      \ extent\n - A data dictionary (.csv) which describes the attributes of the\
      \ polygon vector features\n\nThis data package is freely available to everyone,\
      \ following the principles of equitable access and benefit sharing. However,\
      \ we expect all data users to give attribution to the data providers (read our\
      \ data license) and the use of these data should happen in the light of fair\
      \ use, i.e.: 1) respect the data providers, and provide helpful feedback on\
      \ data quality, and 2) communicate and/or collaborate with the providers if\
      \ you are considering using this dataset for manuscripts or other forms of reporting."
    fr: "Ce paquet de données représente une série chronologique de l'étendue des\
      \ prairies de zostère marine (*Zostera marina*) dérivée de relevés effectués\
      \ par des systèmes aériens télépilotés (RPAS ou drone), ainsi que des métadonnées\
      \ pertinentes. Des relevés RPAS sont effectués chaque année sur des sites de\
      \ surveillance à long terme sur la côte centrale de la Colombie-Britannique,\
      \ au Canada. Ces données sont collectées dans le cadre du programme de cartographie\
      \ de l'habitat de l'Institut Hakai, dont l'objectif général est de documenter\
      \ et de comprendre les tendances à long terme de la dynamique des prairies de\
      \ zostère marine et les facteurs déterminants à l'échelle locale, régionale\
      \ et côtière. L'Institut Hakai a commencé à utiliser des drones en 2015 dans\
      \ le cadre de ces travaux afin de recueillir des données au niveau du site sur\
      \ la distribution de la zostère marine pour des recherches écologiques à long\
      \ terme.\n\nDes relevés par drone sont effectués chaque année pendant les marées\
      \ basses matinales (<0,5 m) et collectent des images RGB (rouge-vert-bleu).\
      \ L'étendue de la zostère marine est dérivée d'orthomosaïques dérivées de drones\
      \ en combinant l'analyse d'images basée sur les objets (OBIA) dans eCognition\
      \ Developer 9 et la délimitation manuelle dans ArcMap (v10.8). Les résultats\
      \ de segmentation sont classés par un analyste qualifié et examinés par un deuxième\
      \ analyste. Une unité cartographique minimale de 2 m² pour une taille de parcelle\
      \ minimale. Les données d'étendue (m²) sont fournies sous forme d'entités vectorielles\
      \ dans la zone NAD83 UTM 9N découpées pour chaque zone d'intérêt (AOI) du site\
      \ afin de garantir que les mêmes zones sont comparées au fil du temps, puis\
      \ publiées dans une géodatabase.\n\n \nCe package de données inclut une géodatabase\
      \ qui contient :\n - Caractéristiques vectorielles polygonales de l'étendue\
      \ de la prairie de zostère marine (.gdb)\n - Caractéristiques vectorielles polygonales\
      \ de la zone d'intérêt (AOI) de chaque site de surveillance (.gdb)\n - Un document\
      \ (.pdf) qui décrit l'emplacement des sites, les méthodes de collecte d'images,\
      \ de génération d'orthomosaïques et de délimitation de l'étendue de la zostère\
      \ marine\n - Un dictionnaire de données (.csv) qui décrit les attributs des\
      \ entités vectorielles des polygones\n\nCe paquet de données est accessible\
      \ gratuitement à tous, conformément aux principes d'accès équitable et de partage\
      \ des avantages. Cependant, nous attendons de tous les utilisateurs de données\
      \ qu'ils attribuent les noms aux fournisseurs de données (lisez notre licence\
      \ de données) et l'utilisation de ces données doit se faire dans le respect\
      \ d'une utilisation équitable, c'est-à-dire : 1) respecter les fournisseurs\
      \ de données et fournir des commentaires utiles sur la qualité des données,\
      \ et 2) communiquer et/ou collaborer avec les fournisseurs si vous envisagez\
      \ d'utiliser cet ensemble de données pour des manuscrits ou d'autres formes\
      \ de reporting."
    translations:
      fr:
        message: text translated using the Amazon translate service / texte traduit
          à l'aide du service de traduction Amazon
        verified: false
