identification:
  abstract:
    en: '[DO NOT PUBLISH]


      The Nanwakolas 50 Watersheds Project was an innovative Indigenous-led science
      partnership to monitor and develop tools to address the threats posed by climate
      change and forest management on salmon habitat in the territories of the Nanwakolas
      member First Nations. The Project was led by the Nanwakolas Council and five
      of its member Nations (We Wai Kai, Wei Wai Kum, Tlowitsis, Mamalilikulla and
      K’ómoks First Nations) in close partnership with the Hakai Institute. Funding
      for the Nanwakolas 50 Watersheds Project was provided by Fisheries and Oceans
      Canada and the Province of British Columbia through the BC Salmon Restoration
      and Innovation Fund. Nanwakolas Council, the Nanwakolas member First Nations,
      and the Hakai Institute (Tula Foundation) contributed significant in-kind contributions
      to the project.


      In order to better understand the effects of forest disturbance and increased
      temperature on salmon habitat, the Nanwakolas 50 Watersheds Project used environmental
      DNA (eDNA) metabarcoding to quantify the biodiversity of aquatic invertebrates,
      salmon, and mammals in the study area. This Metadata Catalogue contains links
      to all the genetic data, detailed methodologies, and scientific reports that
      were generated in support of this project.'
    fr: '[NE PAS PUBLIER]


      Le projet Nanwakolas 50 Watersheds était un partenariat scientifique innovant
      dirigé par des Autochtones visant à surveiller et à développer des outils pour
      faire face aux menaces posées par le changement climatique et la gestion forestière
      sur l''habitat du saumon sur les territoires des Premières nations membres de
      Nanwakolas. Le projet des 50 bassins versants de Nanwakolas a été dirigé par
      le Conseil de Nanwakolas et cinq de ses nations membres (les Premières Nations
      We Wai Kai, Wei Wai Kum, Tlowitsis, Mamalilikulla et K''ómoks) en étroite collaboration
      avec l''Institut Hakai. Le financement du projet Nanwakolas 50 Watersheds a
      été fourni par Pêches et Océans Canada et la province de la Colombie-Britannique
      par l''intermédiaire du BC Salmon Restoration and Innovation Fund. Le Conseil
      de Nanwakolas, les Premières nations membres de Nanwakolas et l''Institut Hakai
      (Fondation Tula) ont apporté d''importantes contributions en nature au projet.


      Afin de mieux comprendre les effets de la perturbation des forêts et de l''augmentation
      de la température sur l''habitat du saumon, le projet Nanwakolas 50 Watersheds
      a utilisé le méta-codage à barres de l''ADN environnemental (ADNe) pour quantifier
      la biodiversité des invertébrés aquatiques, des saumons et des mammifères dans
      la zone d''étude. Ce catalogue de métadonnées contient des liens vers toutes
      les données génétiques, les méthodologies détaillées et les rapports scientifiques
      qui ont été produits à l''appui de ce projet.'
    translations:
      fr:
        message: text translated using the Amazon translate service / texte traduit
          à l'aide du service de traduction Amazon
        verified: false
