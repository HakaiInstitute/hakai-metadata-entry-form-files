identification:
  abstract:
    en: "This data package contains field and genomic data pertaining to the manuscript\
      \ 'Regional, seasonal and wasting disease related patterns in the dermal microbiomes\
      \ of two intertidal sea star species from a multi-year time series'. \n\nThis\
      \ data package is a component of the Hakai Institute’s Nearshore research and\
      \ monitoring program, designed to capture change in rocky intertidal habitats.\
      \ As part of the on-going rocky intertidal surveys on both Calvert and Quadra\
      \ Islands, dermal swab samples were collected for three years within each region\
      \ for a more detailed investigation of the microbiomes associated with two sea\
      \ star species - the ochre star Pisaster ochraceus and the leather star Dermasterias\
      \ imbricata. Seawater samples were also collected adjacent to the site during\
      \ each survey to examine background microbial communities. DNA was extracted\
      \ from swab and seawater samples and the V4 region of the 16S rRNA gene was\
      \ targeted for microbial community profiling. Data were then analyzed to examine\
      \ patterns in microbial communities across the different sample types, regions,\
      \ seasons and stages of wasting disease within P. ochraceus. \n\nThis data package\
      \ is freely available to everyone, following the principles of equitable access\
      \ and benefit sharing. However, we expect all data users to give attribution\
      \ to the data providers (read our data license) and the use of these data should\
      \ happen in the light of fair use, i.e.: 1) respect the data providers, and\
      \ provide helpful feedback on data quality, and 2) communicate and/or collaborate\
      \ with the providers if you are considering using this dataset for manuscripts\
      \ or other forms of reporting."
    fr: "Ce paquet de données contient des données de terrain et génomiques relatives\
      \ au manuscrit « Schémas régionaux, saisonniers et liés aux maladies dégénératives\
      \ dans les microbiomes dermiques de deux espèces d'étoiles de mer intertidales\
      \ issues d'une série chronologique pluriannuelle ». \n\nDans le cadre des études\
      \ intertidales rocheuses en cours sur les îles Calvert et Quadra, des échantillons\
      \ de peau ont été prélevés pendant trois ans dans chaque région afin d'étudier\
      \ plus en détail les microbiomes associés à deux espèces d'étoiles de mer :\
      \ l'étoile ocre Pisaster ochraceus et l'étoile cuirée Dermasterias imbricata.\
      \ Des échantillons d'eau de mer ont également été prélevés à proximité du site\
      \ lors de chaque enquête afin d'examiner les communautés microbiennes de fond.\
      \ L'ADN a été extrait d'échantillons d'écouvillons et d'eau de mer et la région\
      \ V4 du gène de l'ARNr 16S a été ciblée pour le profilage de la communauté microbienne.\
      \ Les données ont ensuite été analysées pour examiner les modèles des communautés\
      \ microbiennes dans les différents types d'échantillons, régions, saisons et\
      \ stades de la maladie débilitante chez P.ochraceus. \n\nCet ensemble de données\
      \ fait partie du programme de recherche et de surveillance des zones littorales\
      \ de l'Institut Hakai, conçu pour capturer les changements dans les habitats\
      \ intertidaux rocheux. L'objectif principal de la recherche menée par Hakai\
      \ Nearshore est d'étudier le rôle des habitats et de leurs communautés associées\
      \ face au stress et aux perturbations provoqués par le changement climatique\
      \ mondial et les perturbations côtières locales. La composante échantillonnage\
      \ de l'ADN et traitement des données génomiques de l'ensemble de données fait\
      \ partie du réseau d'observation biomoléculaire de l'Institut Hakai (HI-BON),\
      \ un projet approuvé par la Décennie des Nations Unies pour les sciences océaniques\
      \ au service du développement durable.\n\nCe paquet de données est accessible\
      \ gratuitement à tous, conformément aux principes d'accès équitable et de partage\
      \ des avantages. Cependant, nous attendons de tous les utilisateurs de données\
      \ qu'ils attribuent les noms aux fournisseurs de données (lisez notre licence\
      \ de données) et l'utilisation de ces données doit se faire dans le respect\
      \ d'une utilisation équitable, c'est-à-dire : 1) respecter les fournisseurs\
      \ de données et fournir des commentaires utiles sur la qualité des données,\
      \ et 2) communiquer et/ou collaborer avec les fournisseurs si vous envisagez\
      \ d'utiliser cet ensemble de données pour des manuscrits ou d'autres formes\
      \ de reporting."
