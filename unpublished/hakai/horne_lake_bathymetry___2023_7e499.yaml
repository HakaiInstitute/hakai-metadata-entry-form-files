platform:
- description:
    en: The Hakai Blue is a 7m aluminum research vessel equipped with a Teledyne Reson
      Seabat T50-R Multibeam Echosounder, with an integrated Applanix INS for the
      recording of position and orientation data. An AML XChange Sound Velocity Profiler
      is kept on board for the recording of sound velocity profiles.
    fr: Le Hakai Blue est un navire de recherche en aluminium de 7 m équipé d'un échosondeur
      multifaisceaux Teledyne Reson Seabat T50-R, avec un Applanix INS intégré pour
      l'enregistrement des données de position et d'orientation. Un profileur de vitesse
      du son AML XChange est conservé à bord pour l'enregistrement des profils de
      vitesse du son.
    translations:
      fr:
        message: text translated using the Amazon translate service / texte traduit
          à l'aide du service de traduction Amazon
        verified: false
