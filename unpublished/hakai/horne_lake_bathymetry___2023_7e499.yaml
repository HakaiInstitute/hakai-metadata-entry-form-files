identification:
  abstract:
    en: 'In September 2023, the Hakai Geospatial Team, in partnership with the Geological
      Survey of Canada, performed a bathymetric survey at Horne Lake, located on Vancouver
      Island in British Columbia, Canada. The data was collected onboard the research
      vessel Hakai Blue which is equipped with a Reson T-50r multibeam system. All
      data is processed and maintained by the Hakai Geospatial Technology team.


      For more information on post processing, data quality assurance, software used,
      and summary of results please contact data@hakai.org'
    fr: 'En septembre 2023, l''équipe géospatiale de Hakai, en partenariat avec la
      Commission géologique du Canada, a effectué un levé bathymétrique au lac Horne,
      situé sur l''île de Vancouver en Colombie-Britannique, au Canada. Les données
      ont été collectées à bord du navire de recherche Hakai Blue, qui est équipé
      d''un système multifaisceaux Reson T-50r. Toutes les données sont traitées et
      conservées par l''équipe de technologie géospatiale de Hakai.


      Pour plus d''informations sur le post-traitement, l''assurance qualité des données,
      les logiciels utilisés et le résumé des résultats, veuillez contacter data@hakai.org'
