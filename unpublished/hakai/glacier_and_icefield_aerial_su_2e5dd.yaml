identification:
  abstract:
    en: 'BC''s South and Central Coast is particularly sensitive to climate change,
      characterized by comparatively warmer winters than continental environments.
      However, the coast''s extreme elevation gradients may provide some resilience
      in watersheds with high elevations and extensive glacier coverage. Better characterization
      of glacier and icefield extent will improve our ability to observe long-term
      change, support and refine existing hydrological models, and provide guidance
      to communities that will need to adapt. Improved glacier monitoring will also
      benefit the oceanographic community, which relies on freshwater flux data to
      model ocean currents, predict plankton blooms, and assess fish stock health.


      A primary mission of the ACO is to map and monitor change to regional glaciers
      and icefields. Lidar, high-resolution imagery, and hyperspectral imagery are
      combined with field observations to detect and measure glacier mass loss and
      ice extent over time. This work is part of a broader Cryosphere initiative that
      integrates ground sampling and sensor networks to validate remotely sensed measurements.


      The Airborne Coastal Observatory (ACO) is a collaborative aerial remote sensing
      platform led by the Hakai Institute, with partners the University of Northern
      British Columbia and Kisik Aerial Surveying. The ACO was developed to map and
      monitor ecosystems from icefields to oceans using airborne Lidar (Light Detection
      and Ranging), high-resolution imagery, and hyperspectral imagery. A Piper Navajo
      aircraft, operated and maintained by Kisik Aerial Surveys (Delta, BC), carries
      an integrated array of these sensors to collect highly accurate near-earth observations.'
    fr: 'La côte sud et centrale de la Colombie-Britannique est particulièrement sensible
      au changement climatique, caractérisée par des hivers relativement plus chauds
      que les environnements continentaux. Cependant, les pentes d''altitude extrêmes
      de la côte peuvent apporter une certaine résilience dans les bassins versants
      à haute altitude et à couverture glaciaire étendue. Une meilleure caractérisation
      de l''étendue des glaciers et des champs de glace améliorera notre capacité
      à observer les changements à long terme, à soutenir et à affiner les modèles
      hydrologiques existants et à fournir des conseils aux communautés qui devront
      s''adapter. L''amélioration de la surveillance des glaciers bénéficiera également
      à la communauté océanographique, qui s''appuie sur les données relatives aux
      flux d''eau douce pour modéliser les courants océaniques, prévoir la prolifération
      du plancton et évaluer la santé des stocks de poissons.


      L''une des principales missions de l''ACO est de cartographier et de surveiller
      l''évolution des glaciers et des champs de glace régionaux. Le lidar, l''imagerie
      haute résolution et l''imagerie hyperspectrale sont combinés à des observations
      sur le terrain pour détecter et mesurer la perte de masse des glaciers et l''étendue
      de la glace au fil du temps. Ces travaux s''inscrivent dans le cadre d''une
      initiative plus vaste sur la cryosphère qui intègre des réseaux d''échantillonnage
      au sol et de capteurs pour valider les mesures de télédétection.


      L''Observatoire côtier aéroporté (ACO) est une plateforme de télédétection aérienne
      collaborative dirigée par l''Institut Hakai, avec ses partenaires l''Université
      du Nord de la Colombie-Britannique et Kisik Aerial Surveying. L''ACO a été développé
      pour cartographier et surveiller les écosystèmes, des champs de glace aux océans,
      à l''aide d''un lidar aéroporté (détection et télémétrie par la lumière), d''imagerie
      haute résolution et d''imagerie hyperspectrale. Un avion Piper Navajo, exploité
      et entretenu par Kisik Aerial Surveys (Delta, Colombie-Britannique), est équipé
      d''un ensemble intégré de ces capteurs afin de recueillir des observations géocroiseurs
      très précises.'
