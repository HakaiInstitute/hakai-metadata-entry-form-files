identification:
  abstract:
    en: Disease outbreaks as a driver of wildlife mass mortality events have increased
      in magnitude and frequency since the 1940s. Remnant populations, composed of
      individuals that survived mass mortality events, could provide insight into
      disease dynamics and species recovery. The sea star wasting disease (SSWD) epidemic
      led to the rapid >90% decline of the sunflower star Pycnopodia helianthoides.
      We surveyed the biomass density of P. helianthoides on the central British Columbia
      coast before, during and after the arrival of SSWD by conducting expert diver
      surveys in shallow subtidal habitats from 2013 to 2023. We found a rapid decline
      in biomass density following the onset of SSWD in 2015. Despite consistent recruitment
      post-outbreak to sites associated with outer islands, we found repeated loss
      of large adult individuals over multiple years. Within nearby fjord habitats,
      we found remnant populations composed of large adult P. helianthoides. The interaction
      of temperature and salinity with the biomass density of P. helianthoides varied
      by location, with high biomass density associated with higher temperatures in
      the outer islands and with lower temperatures and higher salinity in the fjords.
      These patterns suggest that fjords provide refuge from consequences of SSWD
      and protecting these populations could be imperative for the species.
    fr: Les épidémies en tant que facteur de mortalité massive de la faune sauvage
      ont augmenté en ampleur et en fréquence depuis les années 1940. Les populations
      restantes, composées d'individus ayant survécu à des épisodes de mortalité massive,
      pourraient fournir des informations sur la dynamique des maladies et le rétablissement
      des espèces. L'épidémie de maladie débilitante des étoiles de mer (SSWD) a entraîné
      un déclin rapide de plus de 90 % de l'étoile du tournesol Pycnopodia helianthoides.
      Nous avons étudié la densité de la biomasse de P. helianthoides sur la côte
      centrale de la Colombie-Britannique avant, pendant et après l'arrivée de la
      SSWD en effectuant des relevés par des plongeurs experts dans des habitats subtidaux
      peu profonds de 2013 à 2023. Nous avons constaté une baisse rapide de la densité
      de la biomasse après le début du SSWD en 2015. Malgré un recrutement constant
      après l'épidémie sur des sites associés aux îles périphériques, nous avons constaté
      la perte répétée d'individus adultes de grande taille sur plusieurs années.
      Dans les habitats des fjords voisins, nous avons trouvé des populations restantes
      composées de grands adultes de P. helianthoides. L'interaction de la température
      et de la salinité avec la densité de biomasse de P. helianthoides variait selon
      l'emplacement, une densité de biomasse élevée étant associée à des températures
      plus élevées dans les îles périphériques et à des températures plus basses et
      à une salinité plus élevée dans les fjords. Ces tendances suggèrent que les
      fjords constituent un refuge contre les conséquences de la SSWD et que la protection
      de ces populations pourrait être impérative pour l'espèce.
