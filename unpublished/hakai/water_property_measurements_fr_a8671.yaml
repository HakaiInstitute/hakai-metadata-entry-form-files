identification:
  abstract:
    en: Bute Inlet, a prominent fjord on the British Columbia coast, has been a site
      for high-resolution oceanographic profiling through the Bute Inlet Ocean Observing
      Station (BIOOS). A Canadian Pacific Robotic Ocean Observing Facility (C-PROOF)
      Wirewalker wave-powered profiling instrument is deployed on a mooring in the
      central fjord, collecting vertical profiles of conductivity, temperature, pressure,
      and dissolved oxygen concentration. This data contribution consists of provisional
      measurements spanning the current year and has not undergone full quality control.
    fr: Bute Inlet, un fjord important de la côte de la Colombie-Britannique, a été
      le site d'un profilage océanographique à haute résolution par le biais de la
      station d'observation océanique de Bute Inlet (BIOOS). Un instrument de profilage
      à ondes Wirewalker du Centre robotique d'observation océanique du Canadien Pacifique
      (C-PROOF) est déployé sur un amarrage dans le fjord central, pour recueillir
      des profils verticaux de conductivité, de température, de pression et de concentration
      d'oxygène dissous. Cette contribution de données consiste en des mesures provisoires
      couvrant l'année en cours et n'a pas fait l'objet d'un contrôle de qualité complet.
