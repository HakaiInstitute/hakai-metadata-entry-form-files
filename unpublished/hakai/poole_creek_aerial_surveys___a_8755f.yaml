identification:
  abstract:
    en: "The Hakai Institute flew a section of LiDAR across the Poole Creek area to\
      \ look at the effects of the Place Creek outburst flood debris flow. This was\
      \ done as part of Hakai/UNBC research on the hazard of glacier lake outburst\
      \ flooding. This was completed in collaboration with Stantec Consultants, Squamish-Lillooet\
      \ regional district via Graeme Vass, and the Geological Survey of Canada. The\
      \ main objective was to assess channel change following the flood of 2024. \n\
      \nThe Airborne Coastal Observatory (ACO) is a collaborative program led by the\
      \ Hakai Institute along with partners the University of Northern British Columbia.\
      \ The ACO program offers rapid and accurate aerial observations of both terrestrial\
      \ and marine ecosystems, from Icefields to Oceans, and applied across multiple\
      \ scientific disciplines. Data is collected by a Piper Navajo aircraft equipped\
      \ with an array of integrated Earth imaging systems and technology, including:\
      \ 1) A Riegl VQ-780 airborne laser scanner; 2. Two PhaseOne iXU-RS 1000 digital\
      \ medium format cameras; 3. Specim AisaFENIX Imaging Spectrometer; 4. Applanix\
      \ Inertial Navigation System. All data is processed and maintained by the Hakai\
      \ Geospatial Technology team. The aircraft is provided and maintained by Kisik\
      \ Aerial Surveys Inc. (Delta, BC).\n\nPoole Creek study site located adjacent\
      \ to the Sea to Sky Hwy, southwest of Pemberton BC."
    fr: "L'Institut Hakai a fait voler une section de LiDAR dans la région de Poole\
      \ Creek pour examiner les effets de la coulée de débris provoquée par l'explosion\
      \ de Place Creek. Cela a été réalisé dans le cadre des recherches menées par\
      \ Hakai/UNBC sur le risque d'inondations provoquées par des crues provoquées\
      \ par des lacs glaciaires. Cela a été réalisé en collaboration avec Stantec\
      \ Consultants, le district régional de Squamish-Lillooet par l'intermédiaire\
      \ de Graeme Vass, et la Commission géologique du Canada. L'objectif principal\
      \ était d'évaluer le changement de canal suite à la crue de 2024. \n\nL'Observatoire\
      \ côtier aéroporté (ACO) est un programme collaboratif dirigé par le Hakai Institute\
      \ et ses partenaires, l'Université du Nord de la Colombie-Britannique. Le programme\
      \ ACO propose des observations aériennes rapides et précises des écosystèmes\
      \ terrestres et marins, des champs de glace aux océans, appliquées à de multiples\
      \ disciplines scientifiques. Les données sont collectées par un avion Piper\
      \ Navajo équipé d'un ensemble de systèmes et de technologies intégrés d'imagerie\
      \ de la Terre, notamment : 1) Un scanner laser aéroporté Riegl VQ-780 ; 2. Deux\
      \ appareils photo numériques de format moyen PhaseOne iXU-RS 1000 ; 3. Spectromètre\
      \ imageur Specim AISAfenix ; 4. Système de navigation inertielle Applanix. Toutes\
      \ les données sont traitées et gérées par l'équipe de Hakai Geospatial Technology.\
      \ L'avion est fourni et entretenu par Kisik Aerial Surveys Inc. (Delta, Colombie-Britannique).\n\
      \nLe site d'étude de Poole Creek est situé à côté de l'autoroute Sea to Sky,\
      \ au sud-ouest de Pemberton, en Colombie-Britannique."
