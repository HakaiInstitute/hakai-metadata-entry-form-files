identification:
  abstract:
    en: 'This dataset provides research-grade streamflow time series at 5-minute intervals
      from the Kwakshua Watersheds Observatory on the central coast of British Columbia,
      updated annually. Discharge is derived from stage-discharge rating curves, with
      gaugings collected by the autosalt dilution method — injecting a salt solution
      and measuring electrical conductivity to calculate discharge — a reliable technique
      even during high-flow events.

      This is the research-grade subset of the streamflow record: data from reviewed
      rating periods with a confirmed (non-provisional) rating, assigned a quality
      level of 2 or greater (quality level ≥ 2). Each point carries a quality flag
      from review: ''AV'' (Accepted Value), ''EV'' (Estimated Value) for corrected
      data, or ''SVC'' (Suspicious Value Caution) for points a reviewer assessed as
      suspect. Flags from the stage data propagate to the corresponding discharge,
      and flows extrapolated beyond the highest measured gauging are retained with
      added upper-range uncertainty. Data from provisional rating periods, which have
      not been through review, are excluded; the full unreviewed record is available
      in the companion provisional discharge dataset.'
    fr: 'Cet ensemble de données fournit des séries chronologiques de débit de niveau
      scientifique à des intervalles de 5 minutes provenant de l''observatoire des
      bassins versants du Kwakshua sur la côte centrale de la Colombie-Britannique,
      mises à jour chaque année. Le débit est dérivé des courbes nominales de décharge
      par étapes, les jauges étant collectées par la méthode de dilution automatique
      au sel, qui consiste à injecter une solution saline et à mesurer la conductivité
      électrique pour calculer le débit, une technique fiable même en cas de débit
      élevé.

      Il s''agit du sous-ensemble correspondant à la catégorie de recherche de l''enregistrement
      des débits fluviaux : données provenant de périodes de classification examinées
      avec une note confirmée (non provisoire), auxquelles a été attribué un niveau
      de qualité de 2 ou plus (niveau de qualité ≥ 2). Chaque point est associé à
      un indicateur de qualité issu de l''évaluation : « AV » (valeur acceptée), « EV »
      (valeur estimée) pour les données corrigées ou « SVC » (Suspicious Value Caution)
      pour les points considérés comme suspects par un évaluateur. Les indicateurs
      provenant des données de l''étage se propagent au débit correspondant, et les
      débits extrapolés au-delà du jaugeage le plus élevé sont conservés avec une
      incertitude supérieure supplémentaire. Les données des périodes de notation
      provisoires, qui n''ont pas fait l''objet d''un examen, sont exclues ; l''enregistrement
      complet non révisé est disponible dans l''ensemble de données complémentaire
      sur les rejets provisoires.'
